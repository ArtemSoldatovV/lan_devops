apiVersion: apps/v1
kind: Deployment
metadata:
  name: lan-devops
  labels:
    namespace: land-devops-namespace
    app: lan-devops
    version: "0.1.4"

spec:
  replicas: 10
  strategy:
  selector:
    matchLabels:
      app: lan-devops-014
  template:
    metadata:
      labels:
        app: lan-devops-014
        version: "0.1.4"
    spec:
      containers:
      - name: lan-devops-container-014
        image: makarmarkov/lan_devops:v0.1.4
        ports:
        - containerPort: 80
        resources:
          limits:
            memory: "300Mi"
            cpu: "20m"